server.port=8080
spring.application.name=compound-compare
spring.config.import=optional:file:./config/application-secrets.properties,optional:file:./backend/config/application-secrets.properties

# Force UTF-8 encoding for HTTP responses and requests
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# SQLite datasource — compound.db is created/written by fetch_stocks.py
spring.datasource.url=jdbc:sqlite:data/compound.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Local RAG knowledge base
app.rag.enabled=true
app.rag.source-paths[0]=docs
app.rag.source-paths[1]=README_AGENT.md
app.rag.source-paths[2]=README_AGENT_FIX.md
app.rag.source-paths[3]=agent-mvp-plan.md
app.rag.source-paths[4]=v2-stock-strategy-spec.md
app.rag.source-paths[5]=prompt-v2.md
app.rag.max-chunk-length=900
app.rag.chunk-overlap=140
app.rag.default-top-k=5
app.rag.llm.temperature=0.2

# Data refresh scheduling (fetch_stocks.py)
data.refresh.python-path=python
data.refresh.script-path=scripts/fetch_stocks.py
data.refresh.timeout-minutes=5
data.refresh.schedule-enabled=true
data.refresh.schedule-cron=0 30 15 * * MON-FRI
